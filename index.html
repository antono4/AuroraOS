<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuroraOS UI Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --aurora-primary: #8b5cf6;
            --aurora-secondary: #0ea5e9;
            --bg-glass: rgba(25, 25, 30, 0.6);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .device-mockup {
            width: 360px;
            height: 760px;
            background-color: #000;
            border-radius: 40px;
            border: 8px solid #334155;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .camera-hole {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background-color: #050505;
            border-radius: 50%;
            z-index: 100;
        }

        .wallpaper {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, #1a0505 0%, #2d0a0a 30%, #3d1010 60%, #1a0505 100%);
            background-size: 400% 400%;
            animation: auroraGradient 8s ease infinite;
            z-index: 1;
            overflow: hidden;
        }

        /* Fire/Glow effect layer */
        .wallpaper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                /* Fire glow from bottom */
                radial-gradient(ellipse at 50% 100%, rgba(255, 50, 0, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 30% 80%, rgba(255, 100, 0, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(255, 80, 0, 0.3) 0%, transparent 50%),
                /* Top dark overlay */
                radial-gradient(ellipse at 50% 0%, rgba(0, 0, 0, 0.6) 0%, transparent 50%);
            animation: auroraGlow 3s ease-in-out infinite alternate;
        }

        /* Hero silhouette pattern */
        .wallpaper::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                /* Warrior silhouette 1 */
                radial-gradient(ellipse 80px 120px at 15% 70%, rgba(139, 0, 0, 0.3) 0%, transparent 100%),
                /* Warrior silhouette 2 */
                radial-gradient(ellipse 100px 140px at 85% 65%, rgba(100, 0, 0, 0.25) 0%, transparent 100%),
                /* Energy particles */
                radial-gradient(3px 3px at 10% 20%, rgba(255, 100, 0, 0.6), transparent),
                radial-gradient(2px 2px at 25% 35%, rgba(255, 80, 0, 0.5), transparent),
                radial-gradient(3px 3px at 40% 15%, rgba(255, 120, 0, 0.6), transparent),
                radial-gradient(2px 2px at 55% 40%, rgba(255, 90, 0, 0.5), transparent),
                radial-gradient(3px 3px at 70% 25%, rgba(255, 100, 0, 0.6), transparent),
                radial-gradient(2px 2px at 85% 45%, rgba(255, 80, 0, 0.5), transparent),
                radial-gradient(3px 3px at 95% 30%, rgba(255, 110, 0, 0.6), transparent),
                /* Sword slash marks */
                linear-gradient(135deg, transparent 45%, rgba(255, 100, 0, 0.1) 50%, transparent 55%),
                linear-gradient(-135deg, transparent 45%, rgba(255, 80, 0, 0.1) 50%, transparent 55%);
            background-size: 100% 100%;
            animation: auroraMove 6s ease-in-out infinite;
        }

        /* Aurora OS Logo watermark */
        .aurora-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            opacity: 0.15;
        }

        .aurora-logo .logo-text {
            font-size: 48px;
            font-weight: 700;
            color: #8b5cf6;
            text-shadow: 0 0 30px rgba(255, 68, 68, 0.8), 0 0 60px rgba(255, 68, 68, 0.4);
            letter-spacing: 4px;
        }

        .aurora-logo .logo-sub {
            font-size: 32px;
            font-weight: 700;
            color: #0ea5e9;
            text-shadow: 0 0 20px rgba(255, 170, 0, 0.8);
            letter-spacing: 8px;
            margin-top: -5px;
        }

        /* Fire particles rising */
        .particles {
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #8b5cf6, #06b6d4, transparent);
            border-radius: 50%;
            animation: auroraRise 8s linear infinite;
            box-shadow: 0 0 10px #8b5cf6, 0 0 20px #06b6d4;
        }

        .particle:nth-child(1) { left: 5%; animation-delay: 0s; animation-duration: 6s; }
        .particle:nth-child(2) { left: 15%; animation-delay: 1s; animation-duration: 7s; }
        .particle:nth-child(3) { left: 25%; animation-delay: 0.5s; animation-duration: 5s; }
        .particle:nth-child(4) { left: 35%; animation-delay: 2s; animation-duration: 8s; }
        .particle:nth-child(5) { left: 45%; animation-delay: 1.5s; animation-duration: 6s; }
        .particle:nth-child(6) { left: 55%; animation-delay: 0.8s; animation-duration: 7s; }
        .particle:nth-child(7) { left: 65%; animation-delay: 2.5s; animation-duration: 5s; }
        .particle:nth-child(8) { left: 75%; animation-delay: 0.3s; animation-duration: 8s; }
        .particle:nth-child(9) { left: 85%; animation-delay: 1.8s; animation-duration: 6s; }
        .particle:nth-child(10) { left: 95%; animation-delay: 2.2s; animation-duration: 7s; }

        /* Energy orbs */
        .energy-orb {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 100, 0, 0.8), transparent);
            animation: orbFloat 10s ease-in-out infinite;
            box-shadow: 0 0 20px #8b5cf6, 0 0 40px #06b6d4;
        }

        .energy-orb:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
        .energy-orb:nth-child(2) { top: 40%; left: 80%; animation-delay: 2s; width: 15px; height: 15px; }
        .energy-orb:nth-child(3) { top: 60%; left: 20%; animation-delay: 4s; width: 25px; height: 25px; }
        .energy-orb:nth-child(4) { top: 30%; left: 60%; animation-delay: 1s; width: 12px; height: 12px; }

        /* ==================== LOADING SCREEN ==================== */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loading-screen.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-logo {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            letter-spacing: 4px;
            animation: logoPulse 1.5s ease-in-out infinite;
            margin-bottom: 5px;
        }

        .loading-logo-sub {
            font-size: 20px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 12px;
            margin-bottom: 40px;
        }

        .loading-bar-container {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #0ea5e9, #8b5cf6);
            background-size: 200% 100%;
            border-radius: 2px;
            animation: loadingProgress 2.5s ease-in-out forwards, auroraShimmer 1.5s linear infinite;
        }

        .loading-text {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            animation: textBlink 1s ease-in-out infinite;
        }

        .loading-sparks {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #8b5cf6;
            border-radius: 50%;
            box-shadow: 0 0 10px #8b5cf6;
            animation: sparkFly 1.5s ease-out infinite;
        }

        .spark:nth-child(1) { left: 30%; top: 50%; animation-delay: 0s; }
        .spark:nth-child(2) { left: 70%; top: 50%; animation-delay: 0.3s; }
        .spark:nth-child(3) { left: 50%; top: 40%; animation-delay: 0.6s; }
        .spark:nth-child(4) { left: 40%; top: 60%; animation-delay: 0.9s; }
        .spark:nth-child(5) { left: 60%; top: 60%; animation-delay: 1.2s; }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        @keyframes loadingProgress {
            0% { width: 0%; }
            20% { width: 20%; }
            40% { width: 45%; }
            60% { width: 65%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }

        @keyframes auroraShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes textBlink {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes sparkFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(calc((var(--tx, 0.5) - 0.5) * 200px), calc((var(--ty, 0.5) - 0.5) * -200px)) scale(0); opacity: 0; }
        }

        @keyframes auroraGradient {
            0% { background-position: 0% 50%; filter: brightness(1); }
            50% { background-position: 100% 50%; filter: brightness(1.1); }
            100% { background-position: 0% 50%; filter: brightness(1); }
        }

        @keyframes auroraGlow {
            0% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        @keyframes auroraMove {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        @keyframes auroraRise {
            0% { 
                transform: translateY(800px) scale(1); 
                opacity: 0; 
            }
            10% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { 
                transform: translateY(-100px) scale(0.3); 
                opacity: 0; 
            }
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            25% { transform: translate(10px, -20px) scale(1.2); opacity: 1; }
            50% { transform: translate(-5px, -40px) scale(0.8); opacity: 0.8; }
            75% { transform: translate(15px, -20px) scale(1.1); opacity: 0.9; }
        }

        .system-ui {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 15px 5px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-icons {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        /* Home Content */
        .home-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 15px;
        }

        .time-display {
            text-align: center;
            padding: 40px 0 10px;
        }

        .main-time {
            font-size: 72px;
            font-weight: 300;
            letter-spacing: -2px;
        }

        .main-date {
            font-size: 16px;
            opacity: 0.8;
        }

        /* App Grid */
        .app-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 30px 10px;
            max-width: 320px;
            margin: 0 auto;
        }

        .app-icon {
            width: 55px;
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .app-icon:active { transform: scale(0.9); }

        .app-icon-img {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .app-icon-label {
            font-size: 11px;
            text-align: center;
            max-width: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Navigation Bar */
        .nav-bar {
            height: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 10px;
        }

        .nav-indicator {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.5);
            border-radius: 2px;
        }

        /* Quick Settings */
        .qs-panel {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 10px 15px;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            z-index: 200;
        }

        .qs-panel.active { transform: translateY(0); }

        .qs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .qs-title {
            font-size: 18px;
            font-weight: 600;
        }

        .qs-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .qs-tile {
            aspect-ratio: 1;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.1);
        }

        .qs-tile:active { transform: scale(0.95); }
        .qs-tile.active { background: var(--aurora-primary); }

        .qs-tile i { font-size: 20px; }
        .qs-tile span { font-size: 10px; }

        /* App Screen Base */
        .app-screen {
            position: absolute;
            inset: 0;
            background: #1a1a2e;
            z-index: 50;
            display: none;
            flex-direction: column;
        }

        .app-header {
            padding: 25px 15px 10px;
            background: rgba(0,0,0,0.3);
        }

        .app-nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .app-back {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }

        .app-title {
            font-size: 18px;
            font-weight: 600;
        }

        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* Phone App */
        .phone-display {
            text-align: center;
            font-size: 32px;
            padding: 20px;
            min-height: 80px;
        }

        .phone-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 280px;
            margin: 0 auto;
            padding: 20px;
        }

        .phone-btn {
            aspect-ratio: 1.5;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .phone-btn:active { background: rgba(255,255,255,0.2); }
        .phone-btn span { font-size: 10px; opacity: 0.6; }

        .call-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            margin: 15px auto;
        }

        .call-btn.green { background: #22c55e; color: white; }
        .call-btn.red { background: #ef4444; color: white; }

        /* Messages App */
        .chat-list { display: flex; flex-direction: column; gap: 10px; }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover { background: rgba(255,255,255,0.1); }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--aurora-primary), var(--aurora-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; margin-bottom: 3px; }
        .chat-preview { font-size: 13px; opacity: 0.7; }

        .chat-meta { text-align: right; font-size: 11px; opacity: 0.6; }
        .chat-badge {
            background: #22c55e;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-top: 5px;
            display: inline-block;
        }

        /* Settings App */
        .settings-section { display: flex; flex-direction: column; gap: 8px; }

        .settings-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .settings-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .settings-info { flex: 1; }
        .settings-title { font-weight: 600; font-size: 15px; }
        .settings-subtitle { font-size: 12px; opacity: 0.6; margin-top: 2px; }

        /* Toggle Switch */
        .toggle {
            width: 50px;
            height: 28px;
            background: rgba(255,255,255,0.2);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle.active { background: var(--aurora-primary); }

        .toggle::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.3s;
        }

        .toggle.active::after { transform: translateX(22px); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
