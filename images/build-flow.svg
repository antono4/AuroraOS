<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="stepGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="stepGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="stepGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="stepGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34a853"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="stepGrad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ea4335"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="360" fill="#0f0c29"/>
  
  <!-- Title -->
  <text x="300" y="30" font-family="Arial" font-size="20" font-weight="bold" fill="white" text-anchor="middle">🔨 Alur Build AuroraOS</text>
  
  <!-- Step 1 -->
  <rect x="30" y="50" width="540" height="50" rx="12" fill="url(#stepGrad1)"/>
  <circle cx="55" cy="75" r="18" fill="rgba(255,255,255,0.2)"/>
  <text x="55" y="82" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <text x="85" y="72" font-family="Arial" font-size="14" font-weight="bold" fill="white">Setup Environment</text>
  <text x="85" y="90" font-family="Arial" font-size="10" fill="white" opacity="0.8">Install dependencies &amp; configure build tools</text>
  <text x="550" y="78" font-family="monospace" font-size="9" fill="white" opacity="0.7" text-anchor="end">./scripts/setup.sh</text>
  
  <!-- Arrow 1 -->
  <path d="M300,105 L300,125" stroke="#8b5cf6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon points="300,135 293,120 307,120" fill="#8b5cf6"/>
  
  <!-- Step 2 -->
  <rect x="30" y="140" width="540" height="50" rx="12" fill="url(#stepGrad2)"/>
  <circle cx="55" cy="165" r="18" fill="rgba(255,255,255,0.2)"/>
  <text x="55" y="172" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <text x="85" y="162" font-family="Arial" font-size="14" font-weight="bold" fill="white">Sync Source</text>
  <text x="85" y="180" font-family="Arial" font-size="10" fill="white" opacity="0.8">Download AOSP + NusantaraProject repos</text>
  <text x="550" y="168" font-family="monospace" font-size="9" fill="white" opacity="0.7" text-anchor="end">repo sync</text>
  
  <!-- Arrow 2 -->
  <path d="M300,195 L300,215" stroke="#06b6d4" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon points="300,225 293,210 307,210" fill="#06b6d4"/>
  
  <!-- Step 3 -->
  <rect x="30" y="230" width="540" height="50" rx="12" fill="url(#stepGrad3)"/>
  <circle cx="55" cy="255" r="18" fill="rgba(255,255,255,0.2)"/>
  <text x="55" y="262" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <text x="85" y="252" font-family="Arial" font-size="14" font-weight="bold" fill="white">Customize</text>
  <text x="85" y="270" font-family="Arial" font-size="10" fill="white" opacity="0.8">Branding, wallpaper, &amp; features</text>
  <text x="550" y="258" font-family="monospace" font-size="9" fill="white" opacity="0.7" text-anchor="end">./scripts/customize.sh</text>
  
  <!-- Arrow 3 -->
  <path d="M300,285 L300,305" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon points="300,315 293,300 307,300" fill="#f59e0b"/>
  
  <!-- Step 4 -->
  <rect x="30" y="320" width="540" height="50" rx="12" fill="url(#stepGrad4)"/>
  <circle cx="55" cy="345" r="18" fill="rgba(255,255,255,0.2)"/>
  <text x="55" y="352" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <text x="85" y="342" font-family="Arial" font-size="14" font-weight="bold" fill="white">Build ROM</text>
  <text x="85" y="360" font-family="Arial" font-size="10" fill="white" opacity="0.8">Compile source code to flashable ZIP</text>
  <text x="550" y="348" font-family="monospace" font-size="9" fill="white" opacity="0.7" text-anchor="end">mka -j$(nproc)</text>
</svg>
