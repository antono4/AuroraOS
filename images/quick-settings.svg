<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280">
  <defs>
    <linearGradient id="qsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#11111b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="280" rx="20" fill="url(#qsGrad)"/>
  
  <!-- Header -->
  <text x="30" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="white">⚡ Quick Settings</text>
  <rect x="270" y="22" width="25" height="25" rx="12" fill="#333"/>
  <text x="282" y="38" font-family="Arial" font-size="14" fill="white" text-anchor="middle">☀️</text>
  
  <!-- Toggles Row 1 -->
  <rect x="20" y="55" width="65" height="65" rx="16" fill="#8b5cf6"/>
  <text x="52" y="85" font-family="Arial" font-size="26" fill="white" text-anchor="middle">📶</text>
  <text x="52" y="105" font-family="Arial" font-size="9" fill="white" opacity="0.8" text-anchor="middle">Wi-Fi</text>
  <circle cx="75" cy="62" r="5" fill="#4CAF50"/>
  
  <rect x="95" y="55" width="65" height="65" rx="16" fill="#06b6d4"/>
  <text x="127" y="85" font-family="Arial" font-size="26" fill="white" text-anchor="middle">📱</text>
  <text x="127" y="105" font-family="Arial" font-size="9" fill="white" opacity="0.8" text-anchor="middle">Data</text>
  <circle cx="150" cy="62" r="5" fill="#4CAF50"/>
  
  <rect x="170" y="55" width="65" height="65" rx="16" fill="#333"/>
  <text x="202" y="85" font-family="Arial" font-size="26" fill="white" text-anchor="middle">✈️</text>
  <text x="202" y="105" font-family="Arial" font-size="9" fill="white" opacity="0.8" text-anchor="middle">Mode Pesawat</text>
  <circle cx="225" cy="62" r="5" fill="#666"/>
  
  <rect x="245" y="55" width="55" height="65" rx="16" fill="#333"/>
  <text x="272" y="85" font-family="Arial" font-size="26" fill="white" text-anchor="middle">🔦</text>
  <text x="272" y="105" font-family="Arial" font-size="9" fill="white" opacity="0.8" text-anchor="middle">Senter</text>
  <circle cx="290" cy="62" r="5" fill="#666"/>
  
  <!-- Toggles Row 2 -->
  <rect x="20" y="130" width="65" height="65" rx="16" fill="#333"/>
  <text x="52" y="160" font-family="Arial" font-size="26" fill="white" text-anchor="middle">🌙</text>
  <text x="52" y="180" font-family="Arial" font-size="9" fill="white" opacity="0.8" text-anchor="middle">Dark Mode</text>
  <circle cx="75" cy="137" r="5" fill="#666"/>
  
  <rect x="95" y="130" width="65" height="65" rx="16" fill="#333"/>
  <text x="127" y="160" font-family="Arial" font-size="26" fill="white" text-anchor="middle">🔇</text>
  <text x="127" y="180" font-family="Arial" font-size="9" fill="white" opacity="0.8" text-anchor="middle">DND</text>
  <circle cx="150" cy="137" r="5" fill="#666"/>
  
  <rect x="170" y="130" width="65" height="65" rx="16" fill="#333"/>
  <text x="202" y="160" font-family="Arial" font-size="26" fill="white" text-anchor="middle">🔧</text>
  <text x="202" y="180" font-family="Arial" font-size="9" fill="white" opacity="0.8" text-anchor="middle">Settings</text>
  <circle cx="225" cy="137" r="5" fill="#666"/>
  
  <rect x="245" y="130" width="55" height="65" rx="16" fill="#333"/>
  <text x="272" y="160" font-family="Arial" font-size="26" fill="white" text-anchor="middle">📤</text>
  <text x="272" y="180" font-family="Arial" font-size="9" fill="white" opacity="0.8" text-anchor="middle">Cast</text>
  <circle cx="290" cy="137" r="5" fill="#666"/>
  
  <!-- Slider -->
  <rect x="20" y="210" width="280" height="8" rx="4" fill="#333"/>
  <rect x="20" y="210" width="180" height="8" rx="4" fill="#8b5cf6"/>
  <circle cx="200" cy="214" r="10" fill="#8b5cf6"/>
  <text x="200" y="238" font-family="Arial" font-size="10" fill="white" text-anchor="middle">🔆 Kecerahan</text>
  
  <!-- Navigation Bar -->
  <rect x="100" y="255" width="120" height="4" rx="2" fill="#444"/>
</svg>
