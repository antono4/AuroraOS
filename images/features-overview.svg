<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="300" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="300" y="35" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">✨ Fitur Utama AuroraOS</text>
  
  <!-- Feature Cards -->
  <!-- Privacy -->
  <rect x="30" y="60" width="165" height="100" rx="15" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="2"/>
  <text x="112" y="95" font-family="Arial" font-size="32" text-anchor="middle">🔒</text>
  <text x="112" y="120" font-family="Arial" font-size="14" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Privasi Terdepan</text>
  <text x="112" y="140" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Kontrol penuh atas data Anda</text>
  
  <!-- Performance -->
  <rect x="217" y="60" width="165" height="100" rx="15" fill="#1a1a2e" stroke="#06b6d4" stroke-width="2"/>
  <text x="300" y="95" font-family="Arial" font-size="32" text-anchor="middle">⚡</text>
  <text x="300" y="120" font-family="Arial" font-size="14" font-weight="bold" fill="#06b6d4" text-anchor="middle">Performa Optimal</text>
  <text x="300" y="140" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Responsif & hemat baterai</text>
  
  <!-- Customization -->
  <rect x="404" y="60" width="165" height="100" rx="15" fill="#1a1a2e" stroke="#f59e0b" stroke-width="2"/>
  <text x="486" y="95" font-family="Arial" font-size="32" text-anchor="middle">🎨</text>
  <text x="486" y="120" font-family="Arial" font-size="14" font-weight="bold" fill="#f59e0b" text-anchor="middle">Kustomisasi Luas</text>
  <text x="486" y="140" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Personalisasi tanpa batas</text>
  
  <!-- Bottom Row -->
  <!-- Languages -->
  <rect x="30" y="175" width="165" height="100" rx="15" fill="#1a1a2e" stroke="#34a853" stroke-width="2"/>
  <text x="112" y="210" font-family="Arial" font-size="32" text-anchor="middle">🌏</text>
  <text x="112" y="235" font-family="Arial" font-size="14" font-weight="bold" fill="#34a853" text-anchor="middle">Multi-Bahasa</text>
  <text x="112" y="255" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">50+ bahasa termasuk Indonesia</text>
  
  <!-- Updates -->
  <rect x="217" y="175" width="165" height="100" rx="15" fill="#1a1a2e" stroke="#ea4335" stroke-width="2"/>
  <text x="300" y="210" font-family="Arial" font-size="32" text-anchor="middle">🔄</text>
  <text x="300" y="235" font-family="Arial" font-size="14" font-weight="bold" fill="#ea4335" text-anchor="middle">Update Cepat</text>
  <text x="300" y="255" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Update keamanan berkala</text>
  
  <!-- Indonesia -->
  <rect x="404" y="175" width="165" height="100" rx="15" fill="#1a1a2e" stroke="#fbbc05" stroke-width="2"/>
  <text x="486" y="210" font-family="Arial" font-size="32" text-anchor="middle">🇮🇩</text>
  <text x="486" y="235" font-family="Arial" font-size="14" font-weight="bold" fill="#fbbc05" text-anchor="middle">Made in Indonesia</text>
  <text x="486" y="255" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Dirancang untuk Indonesia</text>
</svg>
