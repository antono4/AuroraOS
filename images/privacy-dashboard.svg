<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="200" fill="#0a0a0f"/>
  
  <!-- Header -->
  <text x="160" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">🔒 Privacy Dashboard</text>
  
  <!-- Privacy Cards -->
  <!-- Camera -->
  <rect x="15" y="40" width="90" height="70" rx="12" fill="url(#cardGrad)"/>
  <text x="60" y="65" font-family="Arial" font-size="28" text-anchor="middle">📷</text>
  <text x="60" y="85" font-family="Arial" font-size="10" fill="#4CAF50" text-anchor="middle">Tidak Ada Akses</text>
  <text x="60" y="100" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">Kamera</text>
  
  <!-- Microphone -->
  <rect x="115" y="40" width="90" height="70" rx="12" fill="url(#cardGrad)"/>
  <text x="160" y="65" font-family="Arial" font-size="28" text-anchor="middle">🎤</text>
  <text x="160" y="85" font-family="Arial" font-size="10" fill="#ff9800" text-anchor="middle">1 App Aktif</text>
  <text x="160" y="100" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">Mikrofon</text>
  
  <!-- Location -->
  <rect x="215" y="40" width="90" height="70" rx="12" fill="url(#cardGrad)"/>
  <text x="260" y="65" font-family="Arial" font-size="28" text-anchor="middle">📍</text>
  <text x="260" y="85" font-family="Arial" font-size="10" fill="#4CAF50" text-anchor="middle">Tidak Ada Akses</text>
  <text x="260" y="100" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">Lokasi</text>
  
  <!-- Activity -->
  <rect x="15" y="120" width="290" height="70" rx="12" fill="url(#cardGrad)"/>
  <text x="30" y="145" font-family="Arial" font-size="12" fill="white">📊 Akses 24 Jam Terakhir</text>
  
  <!-- Timeline -->
  <rect x="30" y="155" width="30" height="20" rx="4" fill="#8b5cf6"/>
  <rect x="65" y="155" width="20" height="20" rx="4" fill="#333"/>
  <rect x="90" y="155" width="40" height="20" rx="4" fill="#06b6d4"/>
  <rect x="135" y="155" width="25" height="20" rx="4" fill="#333"/>
  <rect x="165" y="155" width="35" height="20" rx="4" fill="#8b5cf6"/>
  <rect x="205" y="155" width="15" height="20" rx="4" fill="#333"/>
  <rect x="225" y="155" width="45" height="20" rx="4" fill="#06b6d4"/>
  <rect x="275" y="155" width="20" height="20" rx="4" fill="#333"/>
</svg>
