<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 640">
  <defs>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Phone Body -->
  <rect x="10" y="10" width="300" height="620" rx="40" fill="#1a1a1a" stroke="#333" stroke-width="4"/>
  
  <!-- Screen -->
  <rect x="20" y="20" width="280" height="600" rx="32" fill="url(#screenGrad)"/>
  
  <!-- Notch/Camera -->
  <ellipse cx="160" cy="35" rx="40" ry="8" fill="#0a0a0a"/>
  <circle cx="160" cy="35" r="5" fill="#222"/>
  <circle cx="160" cy="35" r="3" fill="#111"/>
  
  <!-- Status Bar -->
  <rect x="20" y="20" width="280" height="35" rx="32" fill="rgba(0,0,0,0.5)"/>
  <text x="40" y="45" font-family="Arial" font-size="12" fill="white">09:41</text>
  <g transform="translate(240, 35)">
    <path d="M-15,-5 L-15,5 L-5,5 L0,0 L5,5 L15,5 L15,-5 L5,-5 L0,0 L-5,-5 Z" fill="#4CAF50" transform="scale(0.6)"/>
    <text x="10" y="3" font-family="Arial" font-size="10" fill="white">87%</text>
  </g>
  
  <!-- Home Screen Content -->
  <text x="160" y="90" font-family="Arial" font-size="36" font-weight="bold" fill="#8b5cf6" text-anchor="middle">09:41</text>
  <text x="160" y="115" font-family="Arial" font-size="14" fill="white" opacity="0.7" text-anchor="middle">Senin, 14 Juli 2025</text>
  
  <!-- App Grid -->
  <g transform="translate(45, 150)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="55" height="55" rx="12" fill="#4285f4"/>
    <text x="27" y="35" font-family="Arial" font-size="24" fill="white" text-anchor="middle">📞</text>
    <text x="27" y="70" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Telepon</text>
    
    <rect x="75" y="0" width="55" height="55" rx="12" fill="#34a853"/>
    <text x="102" y="35" font-family="Arial" font-size="24" fill="white" text-anchor="middle">💬</text>
    <text x="102" y="70" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Pesan</text>
    
    <rect x="150" y="0" width="55" height="55" rx="12" fill="#ea4335"/>
    <text x="177" y="35" font-family="Arial" font-size="24" fill="white" text-anchor="middle">🌐</text>
    <text x="177" y="70" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Chrome</text>
    
    <!-- Row 2 -->
    <rect x="0" y="90" width="55" height="55" rx="12" fill="#fbbc05"/>
    <text x="27" y="125" font-family="Arial" font-size="24" fill="white" text-anchor="middle">📷</text>
    <text x="27" y="160" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Kamera</text>
    
    <rect x="75" y="90" width="55" height="55" rx="12" fill="#8b5cf6"/>
    <text x="102" y="125" font-family="Arial" font-size="24" fill="white" text-anchor="middle">⚙️</text>
    <text x="102" y="160" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Pengaturan</text>
    
    <rect x="150" y="90" width="55" height="55" rx="12" fill="#e91e63"/>
    <text x="177" y="125" font-family="Arial" font-size="24" fill="white" text-anchor="middle">🖼️</text>
    <text x="177" y="160" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Galeri</text>
    
    <!-- Row 3 -->
    <rect x="0" y="180" width="55" height="55" rx="12" fill="#009688"/>
    <text x="27" y="215" font-family="Arial" font-size="24" fill="white" text-anchor="middle">📁</text>
    <text x="27" y="250" font-family="Arial" font-size="10" fill="white" text-anchor="middle">File</text>
    
    <rect x="75" y="180" width="55" height="55" rx="12" fill="#ff5722"/>
    <text x="102" y="215" font-family="Arial" font-size="24" fill="white" text-anchor="middle">▶️</text>
    <text x="102" y="250" font-family="Arial" font-size="10" fill="white" text-anchor="middle">YouTube</text>
    
    <rect x="150" y="180" width="55" height="55" rx="12" fill="#00bcd4"/>
    <text x="177" y="215" font-family="Arial" font-size="24" fill="white" text-anchor="middle">🔒</text>
    <text x="177" y="250" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Privasi</text>
  </g>
  
  <!-- Dock -->
  <rect x="30" y="530" width="260" height="70" rx="20" fill="rgba(255,255,255,0.1)"/>
  <circle cx="80" cy="565" r="22" fill="#8b5cf6"/>
  <text x="80" y="572" font-family="Arial" font-size="18" fill="white" text-anchor="middle">🏠</text>
  <circle cx="160" cy="565" r="22" fill="#333"/>
  <text x="160" y="572" font-family="Arial" font-size="18" fill="white" text-anchor="middle">📱</text>
  <circle cx="240" cy="565" r="22" fill="#333"/>
  <text x="240" y="572" font-family="Arial" font-size="18" fill="white" text-anchor="middle">←</text>
  
  <!-- Navigation Bar -->
  <rect x="110" y="595" width="100" height="5" rx="2" fill="white" opacity="0.5"/>
</svg>
